# PS5 DualSense teleoperation config for teleop_twist_joy
#
# Axis mapping (Linux evdev):
#   0 = Left stick X   (left=-1, right=+1)
#   1 = Left stick Y   (up=-1, down=+1)  ← inverted, hence negative scale
#   2 = L2 analog
#   3 = Right stick X  (left=-1, right=+1)
#   4 = Right stick Y  (up=-1, down=+1)
#   5 = R2 analog
#
# Button mapping:
#   0=Cross  1=Circle  2=Square  3=Triangle
#   4=L1  5=R1  6=L2  7=R2
#   8=Create  9=Options  10=PS  11=L3  12=R3
#   13=D-up  14=D-down  15=D-left  16=D-right  17=Touchpad
#
# Controls:
#   Hold L1           → enable movement (dead-man switch)
#   Hold L1 + R1      → turbo (2x speed)
#   Left stick Y      → linear.x  (forward / backward)
#   Left stick X      → linear.y  (strafe — only useful in swerve mode)
#   Right stick X     → angular.z (rotation)
#
# Drive mode (joy_mode_switcher node):
#   Triangle (3) → swerve
#   Square   (2) → differential
#   Circle   (1) → ackermann

teleop_twist_joy_node:
  ros__parameters:
    # Axes
    axis_linear:
      x: 1        # Left stick Y
      y: 0        # Left stick X
    axis_angular:
      yaw: 3      # Right stick X

    # Normal speed (hold L1)
    scale_linear:
      x: 0.5
      y: 0.5
    scale_angular:
      yaw: 1.0

    # Turbo speed (hold L1 + R1)
    scale_linear_turbo:
      x: 1.0
      y: 1.0
    scale_angular_turbo:
      yaw: 2.0

    # Buttons
    enable_button: 4        # L1 — must hold to publish cmd_vel
    enable_turbo_button: 5  # R1 — doubles speed while held

    require_enable_button: true
    publish_stamped_twist: false
