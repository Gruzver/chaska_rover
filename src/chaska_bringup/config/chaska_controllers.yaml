controller_manager:
  ros__parameters:
    update_rate: 100  # Hz — máximo de los dos sistemas (rover: 50, arm: 100)

    # ── Broadcaster único para todos los joints (rover + brazo) ──────────
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # ── Rover: dirección y tracción ───────────────────────────────────────
    yaw_position_controller:
      type: position_controllers/JointGroupPositionController

    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    # ── Brazo: 5 joints actuados + 1 gripper ─────────────────────────────
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


# ── Configuración rover ───────────────────────────────────────────────────
# Orden debe coincidir con swerve_node.py: [FL, FR, RL, RR]

yaw_position_controller:
  ros__parameters:
    joints:
      - front_left_yaw_joint
      - front_right_yaw_joint
      - rear_left_yaw_joint
      - rear_right_yaw_joint

wheel_velocity_controller:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint


# ── Configuración brazo ───────────────────────────────────────────────────

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0

gripper_controller:
  ros__parameters:
    joints:
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0
