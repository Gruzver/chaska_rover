controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Steering: position control on all 4 yaw joints
    yaw_position_controller:
      type: position_controllers/JointGroupPositionController

    # Drive: velocity control on all 4 wheel joints
    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

# Joint order must match the publisher in swerve_node.py:
#   [front_left, front_right, rear_left, rear_right]

yaw_position_controller:
  ros__parameters:
    joints:
      - front_left_yaw_joint
      - front_right_yaw_joint
      - rear_left_yaw_joint
      - rear_right_yaw_joint

wheel_velocity_controller:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
